<!DOCTYPE html>

<html lang="PT-BR">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rpgantihuidade</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>



<body>

    <div class="container">
        <div class="card text-center">
            <div class="card-body" id ="tela" style="background-image:url('acess/cenariostreetfight0.gif');  background-size: cover;   
  background-repeat: repeat; ;">
            <div class="row">

                <div class="col text-end" id="col-heroi">
                    <ul class="list-group float-center" style="width: 225px">
                        <li id="nome-heroi" class="list-group-item group-item-info list-group-item-success">Lula</li>
                        <li id="titulo-heroi" class="list-group-item">👆</li>
                        <li id="hp-heroi" class="list-group-item ">HP <progress id="hp-heroi" value="500" max="500"
                                style="accent-color: rgb(9, 214, 88);"></progress></li>
                        <li id="mp-heroi" class="list-group-item"> EnergiaMaritima <progress id="mp-heroi" value="300" max="300"
                                style="accent-color: rgb(29, 123, 185);"></progress> </li>
                        <li id="en-heroi" class="list-group-item">Clarinet<progress id="energia-heroi"
                                value="800" max="800" style="accent-color: rgb(90, 70, 117);"></progress>
                        </li>
                    </ul>



                </div>
                <div class="col text-end" id="col-botoes">

                    <img src="acess/heroimoluscolulafazoL.gif" width="300 " height="250"></img>

                </div>
                <div id="caixa-texto" style="font-family: monospace; border: 5px solid rgb(255, 255, 255); padding: 10px; width: 300px;"></div>
                <div class="col text-start" id="col-msg">

                    <img src="acess/homersapatos.gif" width="300" height="250" class="card-img-bottom"></img>

                </div>
                
                <div class="col text-end" id="col-boss">
                    <ul class="list-group float-end" style="width: 225px;">
                        <li id="nome-boss" class="list-group-item list-group-item-danger">Falizeu</li>
                        <li id="titulo-boss" class="list-group-item">🪨</li>
                        <li id="hp-boss" class="list-group-item">HP <progress id="hp-heroi" value="1000" max="1000"
                                style="accent-color: rgb(233, 14, 14); "></progress></li>
                        <li id="mp-boss" class="list-group-item"> Energia <progress id="mp-boss" value="300" max="300"
                                style="accent-color: rgb(58, 144, 184);"></progress></li>
                        <li id="en-boss" class="list-group-item">Predas <progress id="energia-heroi" value="800"
                                max="800" style="accent-color: rgb(97, 97, 97);"></progress></li>
                    </ul>

                    

                </div>
                <div class="btn-group" id="controles">
                    <button class="btn btn-dark">ATTACK</button>
                    <button class="btn btn-dark">Skill</button>
                    <button class="btn btn-dark">Ultimate</button>
                </div>
            </div>

            <div class="row">

                

                
            </div>
                <div class="card-footer"></div>
            </div><!-- card-->
        </div><!--container-->

    </div>
    <script src="jogo.js"></script>
</body>
