<!DOCTYPE html>
<html lang="en">
<body>

    <h1>Acessando elementos pelo DOM</h1>

    <h2>ID (#demo)</h2>
    <div id="demo">Acesso pelo ID</div>

    <h2>Class (.demo)</h2>
    <div class="demo">Acesso pela class (1)</div>
    <div class="demo">Acesso pela class (2)</div>

    <h2>Tag (article)</h2>
    <article>Acesso pela tag (1)</article>
    <article>Acesso pela tag (2)</article>

    <h2>Query Selector</h2>
    <div id="demo-query">Acesso pela query</div>

    <h2>Query Selector All</h2>
    <div class="demo-query-all">Acesso pelo query all (1)</div>
    <div class="demo-query-all">Acesso pelo query all (2)</div>
</body>

</html>
